[package]
name = "ts_runtime"
version.workspace = true
description = "tailscale runtime"
categories = ["network-programming"]
keywords = ["tailscale", "runtime"]

repository.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Our crates.
ts_bart.workspace = true
ts_bart_packetfilter.workspace = true
ts_control.workspace = true
ts_dataplane.workspace = true
ts_keys.workspace = true
ts_netcheck.workspace = true
ts_netmon.workspace = true
ts_netstack_smoltcp = { workspace = true, features = ["tokio"] }
ts_overlay_router.workspace = true
ts_packet.workspace = true
ts_packetfilter = { workspace = true, features = ["checking-filter"] }
ts_packetfilter_state.workspace = true
ts_transport.workspace = true
ts_derp.workspace = true
ts_tunnel.workspace = true

# Unconditionally required dependencies.
futures.workspace = true
ipnet.workspace = true
kameo = "0.21"
kameo_actors = "0.6"
thiserror.workspace = true
tokio.workspace = true
tokio-util = { workspace = true, features = ["rt"] }
tokio-stream = { version = "0.1", default-features = false, features = ["time"] }
tracing.workspace = true
smallvec.workspace = true

[dev-dependencies]
chrono.workspace = true
itertools.workspace = true
proptest.workspace = true
rand.workspace = true
tokio-test = "0.4"
ts_capabilityversion.workspace = true

[features]
console = ["kameo/console"]
otel = ["kameo/otel", "kameo/tracing"]

[lints]
workspace = true

[package.metadata.cargo-machete]
ignored = ["tokio-test"]
