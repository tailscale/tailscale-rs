[package]
name = "ts_tunnel"
version.workspace = true
description = "secure packet tunnel over udp"
categories = ["cryptography", "network-programming", "encoding"]
keywords = ["tailscale", "wireguard", "tunnel", "udp", "sans-io"]

repository.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Our crates.
ts_keys.workspace = true
ts_packet.workspace = true
