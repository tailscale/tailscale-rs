name: c
on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # cache-busting key -- change it if the build changes in a way that invalidates old
  # cached state
  cache_key: init

jobs:
  build_test:
    name: build (rust ${{ matrix.rust_toolchain.label }}, ${{ matrix.target.runner }})
    runs-on: ${{ matrix.target.runner }}

    strategy:
      matrix:
        rust_toolchain:
          - version: 1.94.0
            label: latest

        build:
          - triple: x86_64-unknown-linux-gnu
            runner: linux-x86_64-16cpu
          - triple: aarch64-unknown-linux-gnu
            runner: linux-arm64-16cpu
          # macos uses clang, not working yet
          # - triple: aarch64-apple-darwin
          #        runner: macos-26

    defaults:
      run:
        working-directory: ts_ffi

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup rust
        id: setup-rust
        uses: ./.github/workflows/setup-rust.yml
        with:
          toolchain-version: ${{ matrix.rust_toolchain.version }}
          builder-triple: ${{ matrix.build.triple }}
          runner: ${{ matrix.build.runner }}

      - name: Build examples
        run: make -C examples
